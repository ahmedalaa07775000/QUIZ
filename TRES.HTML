<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treasury</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; user-select: none; color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print { .no-print { display: none !important; } body { background: white; } .print-break-inside-avoid { break-inside: avoid; } }
        .animate-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .fab-shadow { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4); }
        .sidebar-item-active { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .serial-badge { background: #f1f5f9; color: #475569; padding: 4px 12px; border-radius: 10px; font-family: monospace; font-weight: 900; font-size: 1.1rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, createContext, useContext } = React;

        // --- الإعدادات ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw612QWwOgTQ7J4N3xealfRzyX0gqzit26AZuqHqISFwAY3v1i3lh-IgipW8W3WCeC5/exec";
        const CATEGORIES = ["محروقات", "تغيير زيت", "صيانة", "نثريات", "بدل سفر", "أخرى"];

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('treasury_final_pro_v1');
                return saved ? JSON.parse(saved) : { initialBalance: 35000, invoices: [], debts: [], trips: [], googleSheetUrl: SCRIPT_URL };
            });
            const [isSyncing, setIsSyncing] = useState(false);
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            useEffect(() => { localStorage.setItem('treasury_final_pro_v1', JSON.stringify(state)); }, [state]);

            useEffect(() => { loadData(); }, []);

            const syncData = async (dataToSync = state) => {
                if (!dataToSync.googleSheetUrl) return;
                setIsSyncing(true);
                try {
                    const payload = {
                        action: 'syncAll',
                        invoices: dataToSync.invoices.map(inv => ({ ...inv, photoUrl: JSON.stringify(inv.photoUrl || []) })),
                        debts: dataToSync.debts,
                        trips: dataToSync.trips.map(t => ({ ...t, items: JSON.stringify(t.items || []), photoUrls: JSON.stringify(t.photoUrls || []) })),
                        initialBalance: dataToSync.initialBalance
                    };
                    await fetch(dataToSync.googleSheetUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                } catch (e) { addToast("فشل المزامنة", "error"); } finally { setIsSyncing(false); }
            };

            const loadData = async () => {
                setIsSyncing(true);
                try {
                    const res = await fetch(state.googleSheetUrl);
                    const data = await res.json();
                    if (data.success) {
                        const invs = (data.invoices || []).map(i => ({ ...i, photoUrl: typeof i.photoUrl === 'string' ? JSON.parse(i.photoUrl) : (i.photoUrl || []) }));
                        const trps = (data.trips || []).map(t => ({ ...t, items: typeof t.items === 'string' ? JSON.parse(t.items) : (t.items || []), photoUrls: typeof t.photoUrls === 'string' ? JSON.parse(t.photoUrls) : (t.photoUrls || []) }));
                        setState(prev => ({ ...prev, invoices: invs, debts: data.debts || [], trips: trps, initialBalance: data.initialBalance || prev.initialBalance }));
                        addToast("تم تحديث البيانات تلقائياً");
                    }
                } catch (e) { addToast("فشل تحميل البيانات من السيرفر", "error"); } finally { setIsSyncing(false); }
            };

            const value = {
                ...state, isSyncing, toasts, addToast, loadData,
                updateInitialBalance: (val) => { const ns = { ...state, initialBalance: val }; setState(ns); syncData(ns); addToast("تم تحديث العهدة"); },
                addInvoice: (inv) => { const ns = { ...state, invoices: [inv, ...state.invoices] }; setState(ns); syncData(ns); addToast("تمت الإضافة"); },
                addTrip: (trip) => { const ns = { ...state, trips: [trip, ...state.trips] }; setState(ns); syncData(ns); addToast("تمت إضافة الرحلة"); },
                addDebt: (debt) => { const ns = { ...state, debts: [debt, ...state.debts] }; setState(ns); syncData(ns); addToast("تمت إضافة سجل الدين"); },
                deleteItem: (id, type) => {
                    let ns;
                    if (type === 'invoice') ns = { ...state, invoices: state.invoices.filter(i => i.id !== id) };
                    else if (type === 'trip') ns = { ...state, trips: state.trips.filter(t => t.id !== id) };
                    else ns = { ...state, debts: state.debts.filter(d => d.id !== id) };
                    setState(ns); syncData(ns); addToast("تم الحذف بنجاح");
                },
                deletePersonDebts: (person) => {
                    const ns = { ...state, debts: state.debts.filter(d => d.person !== person) };
                    setState(ns); syncData(ns); addToast("تم حذف جميع معاملات الشخص بنجاح");
                },
                settlePersonDebts: (person) => {
                    const ns = { ...state, debts: state.debts.map(d => d.person === person ? { ...d, status: 'Settled' } : d) };
                    setState(ns); syncData(ns); addToast("تمت التسوية الشاملة بنجاح");
                },
       settleItem: (id, type) => {
                    let ns = { ...state };
                    if (type === 'debt') {
                        ns.debts = state.debts.map(d => d.id === id ? { ...d, status: 'Settled' } : d);
                    } else if (type === 'trip') {
                        const trip = state.trips.find(t => t.id === id);
                        if (trip) {
                            const textDesc = trip.items.map(i => `${i.category}: ${i.amount}`).join(" | ");
                            const settledAsInvoice = {
                                ...trip,
                                type: 'invoice',
                                amount: trip.totalAmount,
                                photoUrl: trip.photoUrls || trip.photoUrl, // توحيد اسم مصفوفة الصور
                                status: 'Reimbursed',
                                category: 'رحلة عمل',
                                description: textDesc
                            };
                            ns.trips = state.trips.filter(t => t.id !== id);
                            ns.invoices = [settledAsInvoice, ...state.invoices];
                        }
                    } else if (type === 'invoice') {
                        ns.invoices = state.invoices.map(i => i.id === id ? { ...i, status: 'Reimbursed' } : i);
                    }
                    setState(ns); syncData(ns); addToast("تم التحصيل ونقلها للأرشيف بنجاح");
                }
            };
            return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
        };

        const useApp = () => useContext(AppContext);

        // --- المكونات المشتركة ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, type = "primary" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[600] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 text-center space-y-6">
                        <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto ${type === 'danger' ? 'bg-rose-50 text-rose-600' : 'bg-indigo-50 text-indigo-600'}`}>
                            <Icon name={type === 'danger' ? 'trash-2' : 'help-circle'} size={36} />
                        </div>
                        <div className="space-y-2">
                            <h3 className="text-2xl font-black text-slate-900">{title}</h3>
                            <p className="text-slate-500 font-bold text-sm leading-relaxed">{message}</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onConfirm} className={`flex-1 py-4 rounded-2xl font-black transition-all active:scale-95 ${type === 'danger' ? 'bg-rose-600 text-white' : 'bg-indigo-600 text-white'}`}>تأكيد</button>
                            <button onClick={onCancel} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black active:scale-95 transition-all">إلغاء</button>
                        </div>
                    </div>
                </div>
            );
        };
const DetailsModal = ({ item, onClose }) => {
            if (!item) return null;
            const hasItems = item.items && item.items.length > 0;
            
            // معالجة الصور لضمان ظهورها سواء كانت مصفوفة أو نص
            let photos = item.photoUrl || item.photoUrls || [];
            if (typeof photos === 'string') {
                try { photos = JSON.parse(photos); } 
                catch (e) { photos = [photos]; }
            }

            return (
                <div className="fixed inset-0 z-[700] flex items-end sm:items-center justify-center bg-slate-900/50 backdrop-blur-sm animate-in" onClick={onClose}>
                    <div className="bg-white w-full max-w-2xl rounded-t-[3rem] sm:rounded-[3rem] max-h-[92vh] overflow-hidden flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <h3 className="text-xl font-black">التفاصيل الكاملة</h3>
                            <button onClick={onClose} className="p-3 bg-slate-200 rounded-full active:scale-90 transition-all"><Icon name="x" /></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar safe-bottom">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-slate-50 p-4 rounded-2xl"><p className="text-[10px] font-bold text-slate-400 mb-1">الاسم</p><p className="font-black">{item.person}</p></div>
                                <div className="bg-slate-50 p-4 rounded-2xl"><p className="text-[10px] font-bold text-slate-400 mb-1">التاريخ</p><p className="font-black">{item.date}</p></div>
                                {item.serialNumber && <div className="bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-100"><p className="text-[10px] font-bold text-indigo-400 mb-1">السيريال نمبر</p><p className="text-2xl font-black font-mono text-indigo-700">{item.serialNumber}</p></div>}
                                <div className="bg-indigo-50 p-4 rounded-2xl"><p className="text-[10px] font-bold text-indigo-400 mb-1">المبلغ</p><p className="text-xl font-black text-indigo-600">{Number(item.amount || item.totalAmount).toLocaleString()} ريال</p></div>
                            </div>
                            {item.description && !hasItems && <div className="bg-slate-50 p-4 rounded-2xl border"><p className="text-[10px] font-bold text-slate-400 mb-1">الوصف</p><p className="text-slate-700 font-bold">{item.description}</p></div>}
                            {hasItems && (
                                <div className="space-y-3">
                                    <p className="text-xs font-black text-slate-400 px-2">بنود الرحلة</p>
                                    {item.items.map((b, i) => <div key={i} className="flex justify-between p-4 bg-slate-50 rounded-2xl border text-sm"><span>{b.category} - {b.description}</span><span className="font-black">{Number(b.amount).toLocaleString()} ريال</span></div>)}
                                </div>
                            )}
                            {photos && photos.length > 0 && (
                                <div className="space-y-3">
                                    <p className="text-xs font-black text-slate-400 px-2">المرفقات</p>
                                    <div className="flex flex-col gap-4">
                                        {photos.map((p, i) => <img key={i} src={p} className="w-full rounded-3xl border shadow-sm" />)}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ImageUploader = ({ images, setImages }) => {
            const ref = useRef();
            return (
                <div className="space-y-3">
                    <div className="grid grid-cols-4 gap-2">
                        {images.map((img, i) => (
                            <div key={i} className="relative aspect-square rounded-xl overflow-hidden border shadow-sm">
                                <img src={img} className="w-full h-full object-cover" />
                                <button type="button" onClick={() => setImages(prev => prev.filter((_, idx) => idx !== i))} className="absolute top-0 left-0 bg-rose-500 text-white p-1 rounded-br-xl"><Icon name="x" size={12} /></button>
                            </div>
                        ))}
                        <button type="button" onClick={() => ref.current.click()} className="aspect-square border-2 border-dashed rounded-xl flex items-center justify-center text-slate-300 hover:text-indigo-400 hover:border-indigo-400 transition-all"><Icon name="camera" /></button>
                    </div>
                    <input type="file" ref={ref} className="hidden" multiple accept="image/*" onChange={e => {
                        Array.from(e.target.files).forEach(file => {
                            const r = new FileReader();
                            r.onload = () => setImages(p => [...p, r.result]);
                            r.readAsDataURL(file);
                        });
                    }} />
                </div>
            );
        };
        // --- الشاشات ---
        const Dashboard = () => {
            const { initialBalance, invoices, debts, trips, loadData, isSyncing } = useApp();
            const stats = useMemo(() => {
                const pInv = invoices.filter(i => i.status === 'Pending').reduce((a, b) => a + Number(b.amount), 0);
                const pTrp = trips.filter(t => t.status === 'Pending').reduce((a, b) => a + Number(b.totalAmount), 0);
                const out = debts.filter(d => d.type === 'عليه' && d.status === 'Pending').reduce((a, b) => a + Number(b.amount), 0);
                const inD = debts.filter(d => d.type === 'له' && d.status === 'Pending').reduce((a, b) => a + Number(b.amount), 0);
                return { pending: pInv + pTrp, out, inD, current: initialBalance - (pInv + pTrp) - out + inD };
            }, [initialBalance, invoices, debts, trips]);

            return (
                <div className="space-y-6 pb-24 md:pb-10">
                    <div className="flex justify-between items-center px-2">
                        <h2 className="text-3xl font-black text-slate-900">الرئيسية</h2>
                        <button onClick={loadData} className={`p-3 bg-white rounded-2xl shadow-sm border transition-all active:scale-90 ${isSyncing ? 'animate-spin text-indigo-600' : 'text-slate-400'}`}><Icon name="refresh-cw" /></button>
                    </div>
                    <div className="bg-slate-900 p-8 md:p-12 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute -top-10 -right-10 w-60 h-60 bg-indigo-600/20 rounded-full blur-3xl"></div>
                        <p className="text-indigo-300 text-sm font-bold mb-2">النقدية المتوفرة</p>
                        <h2 className="text-5xl md:text-7xl font-black font-mono tracking-tighter">{stats.current.toLocaleString()} <span className="text-xl md:text-2xl opacity-50">ريال</span></h2>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div className="p-4 bg-orange-50 text-orange-600 rounded-2xl"><Icon name="clock" size={24} /></div>
                            <div><p className="text-slate-400 text-xs font-bold mb-1">معلق (فواتير ورحلات)</p><p className="text-2xl font-black text-slate-900 font-mono">{stats.pending.toLocaleString()} ريال</p></div>
                        </div>
                        <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div className="p-4 bg-rose-50 text-rose-600 rounded-2xl"><Icon name="arrow-up-right" size={24} /></div>
                            <div><p className="text-slate-400 text-xs font-bold mb-1">إجمالي لينا</p><p className="text-2xl font-black text-slate-900 font-mono">{stats.out.toLocaleString()} ريال</p></div>
                        </div>
                        <div className="bg-white p-6 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div className="p-4 bg-blue-50 text-blue-600 rounded-2xl"><Icon name="arrow-down-left" size={24} /></div>
                            <div><p className="text-slate-400 text-xs font-bold mb-1">إجمالي علينا</p><p className="text-2xl font-black text-slate-900 font-mono">{stats.inD.toLocaleString()} ريال</p></div>
                        </div>
                    </div>
                </div>
            );
        };

        const Debts = () => {
            const { debts, addDebt, deletePersonDebts, settlePersonDebts, addToast } = useApp();
            const [search, setSearch] = useState("");
            const [showAdd, setShowAdd] = useState(false);
            const [historyPerson, setHistoryPerson] = useState(null);
            const [confirm, setConfirm] = useState({ open: false, title: "", message: "", onConfirm: null, type: "primary" });
            const [f, setF] = useState({ person: "", amount: "", type: "عليه", description: "", date: new Date().toISOString().split('T')[0] });

            const groupedDebts = useMemo(() => {
                const groups = {};
                debts.forEach(d => {
                    if (!groups[d.person]) {
                        groups[d.person] = { person: d.person, netBalance: 0, transactions: [] };
                    }
                    groups[d.person].transactions.push(d);
                    if (d.status === 'Pending') {
                        if (d.type === 'عليه') groups[d.person].netBalance += Number(d.amount);
                        else if (d.type === 'له') groups[d.person].netBalance -= Number(d.amount);
                    }
                });
                return Object.values(groups).sort((a, b) => Math.abs(b.netBalance) - Math.abs(a.netBalance));
            }, [debts]);

            const filteredGroups = groupedDebts.filter(g => g.person.includes(search));
            
            const totalLina = groupedDebts.reduce((sum, g) => g.netBalance > 0 ? sum + g.netBalance : sum, 0);
            const totalAlina = groupedDebts.reduce((sum, g) => g.netBalance < 0 ? sum + Math.abs(g.netBalance) : sum, 0);

            const handleFullDelete = (personData) => {
                if (personData.netBalance !== 0) {
                    addToast("لا يمكن الحذف، يجب تسوية حساب الشخص أولاً لتصبح مديونيته صفر", "error");
                    return;
                }
                setConfirm({
                    open: true, title: "تأكيد الحذف الشامل", message: `هل أنت متأكد من حذف جميع معاملات ${personData.person}؟`, type: "danger",
                    onConfirm: () => { deletePersonDebts(personData.person); setConfirm({ ...confirm, open: false }); }
                });
            };

            const handleFullSettle = (person) => {
                setConfirm({
                    open: true, title: "تأكيد التسوية الشاملة", message: `هل تم تصفية جميع الحسابات مع ${person}؟`, type: "primary",
                    onConfirm: () => { settlePersonDebts(person); setConfirm({ ...confirm, open: false }); }
                });
            };

            const openAddModal = (personName = "") => {
                setF({ person: personName, amount: "", type: "عليه", description: "", date: new Date().toISOString().split('T')[0] });
                setShowAdd(true);
            };

            return (
                <div className="space-y-6 pb-24 md:pb-10">
                    <ConfirmModal isOpen={confirm.open} title={confirm.title} message={confirm.message} type={confirm.type} onConfirm={confirm.onConfirm} onCancel={() => setConfirm({ ...confirm, open: false })} />
                    
                    <div className="flex justify-between items-center px-2">
                        <h2 className="text-3xl font-black text-slate-900">السلف</h2>
                        <button onClick={() => openAddModal()} className="hidden md:flex bg-slate-900 text-white px-6 py-3 rounded-2xl font-black items-center gap-2 shadow-lg active:scale-95 transition-all"><Icon name="plus" /> إضافة سلفة</button>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-rose-50 p-6 rounded-[2rem] border border-rose-100 shadow-sm">
                            <p className="text-rose-600 text-xs font-bold mb-1">إجمالي لينا</p>
                            <p className="text-2xl font-black text-rose-700 font-mono">{totalLina.toLocaleString()} ريال</p>
                        </div>
                        <div className="bg-blue-50 p-6 rounded-[2rem] border border-blue-100 shadow-sm">
                            <p className="text-blue-600 text-xs font-bold mb-1">إجمالي علينا</p>
                            <p className="text-2xl font-black text-blue-700 font-mono">{totalAlina.toLocaleString()} ريال</p>
                        </div>
                    </div>

                    <div className="relative">
                        <Icon name="search" size={20} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" />
                        <input type="text" placeholder="ابحث باسم الشخص..." className="w-full pr-12 pl-4 py-4 bg-white border rounded-[1.5rem] shadow-sm focus:outline-none font-bold" value={search} onChange={e => setSearch(e.target.value)} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredGroups.map(g => (
                            <div key={g.person} className={`bg-white p-5 rounded-[2rem] border-r-8 shadow-sm flex flex-col gap-4 ${g.netBalance > 0 ? 'border-r-rose-500' : g.netBalance < 0 ? 'border-r-blue-500' : 'border-r-emerald-500'}`}>
                                <div className="flex justify-between items-center">
                                    <h4 className="font-black text-slate-800 text-lg">{g.person}</h4>
                                    <div className="text-left">
                                        <p className={`font-black text-xl font-mono leading-none ${g.netBalance > 0 ? 'text-rose-600' : g.netBalance < 0 ? 'text-blue-600' : 'text-emerald-600'}`}>
                                            {Math.abs(g.netBalance).toLocaleString()} ريال
                                        </p>
                                        <p className="text-[10px] font-bold text-slate-400 mt-1">
                                            {g.netBalance > 0 ? 'عليه' : g.netBalance < 0 ? 'له ' : 'خالص'}
                                        </p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-2 pt-3 border-t">
                                    <button onClick={() => setHistoryPerson(g)} className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-xl text-xs font-black hover:bg-slate-200 transition-all">سجل المعاملات</button>
                                    <button onClick={() => openAddModal(g.person)} className="flex-1 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-black hover:bg-indigo-100 transition-all">إضافة معاملة</button>
                                    {g.netBalance !== 0 && (

       const TripsScreen = () => {

const Archive = () => {

                                    <Icon name="search" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input type="text" placeholder="الاسم أو السيريال..." className="w-full pr-12 pl-4 py-3 bg-slate-50 border rounded-2xl focus:outline-none font-bold text-sm" value={search} onChange={e => setSearch(e.target.value)} />

                            <div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                </div>
                                <div className="text-left">
                                    <p className="font-black text-emerald-600 font-mono text-lg">{Number(item.amount).toLocaleString()}</p>
                                    <div className="flex gap-2 mt-2 justify-end" onClick={e => e.stopPropagation()}>
                                        <button onClick={() => setConfirm({ open: true, id: item.id })} className="text-rose-500 p-2 hover:bg-rose-50 rounded-xl transition-all active:scale-90"><Icon name="trash-2" size={18} /></button>

      const TripForm = ({ onAdd }) => {
            const { invoices, trips, addToast } = useApp();
            const [f, setF] = useState({ person: "", serialNumber: "", date: new Date().toISOString().split('T')[0], items: [{ id: 1, category: "محروقات", amount: "", description: "" }] });
            const [imgs, setImgs] = useState([]);
            const [confirm, setConfirm] = useState(false);

            const updateItem = (id, k, v) => setF({ ...f, items: f.items.map(i => i.id === id ? { ...i, [k]: v } : i) });
            
            const handleSubmit = (e) => {
                e.preventDefault();
                if (imgs.length === 0) {
                    return addToast("يجب إرفاق صورة واحدة على الأقل للرحلة", "error");
                }
                
                // تحويل السيريال المدخل إلى نص (String) وإزالة المسافات
                const inputSerial = String(f.serialNumber).trim();
                
                // البحث في الفواتير والرحلات مع تحويل السيريالات المخزنة إلى نصوص أيضاً للمطابقة الدقيقة
                const isDuplicate = invoices.some(i => i.serialNumber && String(i.serialNumber).trim() === inputSerial) || 
                                    trips.some(t => t.serialNumber && String(t.serialNumber).trim() === inputSerial);
                                    
                if (isDuplicate) return addToast("عذراً، السيريال مكرر مسبقاً!", "error");
                setConfirm(true);
            };

            return (
                <>

            );
        };

       const Report = () => {
            const { invoices, trips } = useApp();
            const pInv = invoices.filter(i => i.status === 'Pending');
            const pTrp = trips.filter(t => t.status === 'Pending');
            const total = pInv.reduce((a, b) => a + Number(b.amount), 0) + pTrp.reduce((a, b) => a + Number(b.totalAmount), 0);
            
            // حساب تقسيمة المبالغ حسب الفئة
            const breakdown = useMemo(() => {
                const totals = {};
                pInv.forEach(inv => {
                    if (!totals[inv.category]) totals[inv.category] = 0;
                    totals[inv.category] += Number(inv.amount);
                });
                pTrp.forEach(trip => {
                    (trip.items || []).forEach(item => {
                        if (!totals[item.category]) totals[item.category] = 0;
                        totals[item.category] += Number(item.amount);
                    });
                });
                return Object.entries(totals).sort((a, b) => b[1] - a[1]); // ترتيب تنازلي حسب المبلغ
            }, [pInv, pTrp]);

            return (
                <div className="space-y-8 pb-28 md:pb-10">
                    <div className="flex justify-between items-center px-2 no-print">
                        <h2 className="text-3xl font-black text-slate-900">التقرير المالي</h2>
                        <button onClick={() => window.print()} className="bg-slate-800 text-white p-5 rounded-[1.5rem] shadow-xl active:scale-90 transition-all"><Icon name="printer" size={24} /></button>
                    </div>
                    <div className="bg-white p-8 md:p-16 rounded-[3rem] border shadow-sm print:p-0 print:border-none print:shadow-none">
                        <div className="text-center mb-12 border-b pb-10">
                            <h1 className="text-3xl md:text-5xl font-black text-slate-900 mb-3">بيان مصروفات العهدة</h1>
                            <p className="text-slate-400 font-black text-sm uppercase tracking-widest">{new Date().toLocaleDateString('ar-SA')}</p>
                        </div>
                        
                        <div className="mb-8 bg-indigo-600 p-8 md:p-12 rounded-[2.5rem] text-white flex flex-col md:flex-row justify-between items-center gap-4 shadow-xl shadow-indigo-600/20">
                            <span className="font-black text-indigo-100 text-xl">إجمالي المطلوب تحصيله:</span>
                            <span className="text-4xl md:text-6xl font-black font-mono leading-none">{total.toLocaleString()} <span className="text-xl font-sans opacity-50">ريال</span></span>
                        </div>

                        {/* تقسيمة المبالغ */}
                        {breakdown.length > 0 && (
                            <div className="mb-12 grid grid-cols-2 md:grid-cols-3 gap-4">
                                {breakdown.map(([cat, amt]) => (
                                    <div key={cat} className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 flex flex-col items-center text-center shadow-sm">
                                        <span className="text-slate-500 font-black text-sm mb-2">{cat}</span>
                                        <span className="text-2xl font-black text-indigo-600 font-mono">{amt.toLocaleString()}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="space-y-16">
                            {pInv.map(inv => (
                                <div key={inv.id} className="border-2 border-slate-100 rounded-[3rem] p-8 space-y-8 print-break-inside-avoid shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between md:items-center border-b border-slate-100 pb-6 gap-4">
                                        <div>
                                            <h4 className="text-2xl font-black text-slate-900 mb-1">{inv.person}</h4>
                                            <p className="text-slate-400 font-black text-xs">{inv.date} • {inv.category}</p>
                                        </div>
                                        <div className="text-right md:text-left">
                                            <p className="text-3xl font-black text-indigo-600 font-mono leading-none">{Number(inv.amount).toLocaleString()}</p>
                                            <div className="mt-2"><span className="serial-badge text-xl px-6 py-2">SN: {inv.serialNumber}</span></div>
                                        </div>
                                    </div>
                                    {inv.description && <p className="bg-slate-50 p-6 rounded-[1.5rem] text-slate-700 font-bold border leading-relaxed">{inv.description}</p>}
                                    
                                    {/* عرض الصور للفواتير القديمة إن وجدت */}
                                    {inv.photoUrl && inv.photoUrl.length > 0 && (
                                        <div className="mt-8 space-y-4">
                                            <h5 className="text-sm font-black text-slate-400 px-2 uppercase tracking-widest">المرفقات</h5>
                                            <div className="grid grid-cols-1 gap-6">
                                                {inv.photoUrl.map((p, i) => <img key={i} src={p} className="w-full rounded-[2rem] border-2 shadow-sm object-contain max-h-[800px] mx-auto" />)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {pTrp.map(trip => (
                                <div key={trip.id} className="border-2 border-slate-100 rounded-[3rem] p-8 space-y-8 print-break-inside-avoid shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between md:items-center border-b border-slate-100 pb-6 gap-4">
                                        <div>
                                            <h4 className="text-2xl font-black text-slate-900 mb-1">{trip.person}</h4>
                                            <p className="text-slate-400 font-black text-xs">{trip.date} • رحلة عمل</p>
                                        </div>
                                        <div className="text-right md:text-left">
                                            <p className="text-3xl font-black text-indigo-600 font-mono leading-none">{Number(trip.totalAmount).toLocaleString()}</p>
                                            <div className="mt-2"><span className="serial-badge text-xl px-6 py-2">SN: {trip.serialNumber}</span></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">{trip.items.map((it, i) => <div key={i} className="flex justify-between p-4 bg-slate-50 rounded-2xl border text-xs font-black"><span className="text-slate-600">{it.category} - {it.description}</span><span className="text-indigo-600 font-mono">{Number(it.amount).toLocaleString()}</span></div>)}</div>
                                    
                                    {/* عرض الصور للرحلات */}
                                    {trip.photoUrls && trip.photoUrls.length > 0 && (
                                        <div className="mt-8 space-y-4">
                                            <h5 className="text-sm font-black text-slate-400 px-2 uppercase tracking-widest">المرفقات</h5>
                                            <div className="grid grid-cols-1 gap-6">
                                                {trip.photoUrls.map((p, i) => <img key={i} src={p} className="w-full rounded-[2rem] border-2 shadow-sm object-contain max-h-[800px] mx-auto" />)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const Settings = () => {
            const { initialBalance, updateInitialBalance } = useApp();
            const [v, setV] = useState(initialBalance);
            const [confirm, setConfirm] = useState(false);
            return (
                <div className="space-y-8 pb-24 md:pb-10">
                    <ConfirmModal isOpen={confirm} title="تعديل العهدة" message="هل تريد تغيير المبلغ؟" onConfirm={() => { updateInitialBalance(Number(v)); setConfirm(false); }} onCancel={() => setConfirm(false)} />
                    <h2 className="text-3xl font-black text-slate-900 px-2">الإعدادات</h2>
                    <div className="bg-white p-10 md:p-16 rounded-[3rem] border shadow-sm space-y-8">
                        <div className="space-y-4 max-w-md">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mr-4">مبلغ العهدة الأساسي</label>
                            <div className="flex flex-col gap-4">
                                <input type="number" className="w-full p-6 bg-slate-50 border rounded-[2rem] text-4xl font-black font-mono outline-none text-indigo-600 focus:border-indigo-300" value={v} onChange={e => setV(e.target.value)} />
                                <button onClick={() => setConfirm(true)} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-2xl active:scale-95 transition-all">حفظ التعديل</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

       const App = () => {
            const [active, setActive] = useState('dashboard');
            const [isAuth, setIsAuth] = useState(false);
            const [pin, setPin] = useState("");

            if (!isAuth) return (
                <div className="fixed inset-0 bg-slate-950 flex items-center justify-center p-6">
                    <div className="bg-white rounded-[3.5rem] p-10 w-full max-w-md text-center space-y-10 animate-in shadow-2xl">
                        <div className="bg-indigo-600 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto text-white shadow-xl border-4 border-indigo-500"><Icon name="lock" size={40} /></div>
                        <div className="space-y-2"><h2 className="text-3xl font-black text-slate-900">الخزنة</h2><p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest">يرجى إدخال رمز الدخول</p></div>
                        <input type="password" placeholder="أدخل الرمز" className="w-full text-center text-4xl tracking-[1.5rem] py-5 bg-slate-50 border-2 rounded-2xl outline-none focus:border-indigo-500 transition-all font-black" value={pin} onChange={e => { setPin(e.target.value); if(e.target.value === "0777") setIsAuth(true); }} />
                    </div>
                </div>
            );

            const nav = [
                { id: 'dashboard', label: 'الرئيسية', icon: 'layout-dashboard' },
                { id: 'invoices', label: 'الفواتير', icon: 'map' },
                { id: 'debts', label: 'السلف', icon: 'users' },
                { id: 'report', label: 'التقرير', icon: 'printer' },
                { id: 'archive', label: 'الأرشيف', icon: 'archive' },
                { id: 'settings', label: 'الإعدادات', icon: 'settings' },
            ];

            return (
                <AppProvider>
                    <div className="flex h-screen overflow-hidden bg-slate-50">
                        <aside className="hidden md:flex flex-col w-80 bg-white border-l p-8 space-y-10 shadow-xl z-[200]">
                            <div className="flex items-center gap-4 px-2">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="wallet" size={24} /></div>
                                <h1 className="text-2xl font-black text-slate-900 leading-none">الخزنة</h1>
                            </div>
                            <nav className="flex-1 space-y-3">
                                {nav.map(n => (
                                    <button key={n.id} onClick={() => setActive(n.id)} className={`w-full flex items-center gap-4 p-5 rounded-2xl font-black transition-all ${active === n.id ? 'sidebar-item-active' : 'text-slate-400 hover:bg-slate-50'}`}>
                                        <Icon name={n.icon} size={24} />
                                        <span>{n.label}</span>
                                    </button>
                                ))}
                            </nav>
                            <div className="p-6 bg-slate-50 rounded-[2rem] border border-dashed">
                                <p className="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">المستخدم الحالي</p>
                                <p className="font-black text-slate-900">علاء السيد</p>
                            </div>
                        </aside>

                        <main className="flex-1 overflow-y-auto p-4 md:p-12 custom-scrollbar safe-bottom">
                            <div className="max-w-6xl mx-auto animate-in">
                                {active === 'dashboard' && <Dashboard />}
                                {active === 'invoices' && <TripsScreen />}
                                {active === 'debts' && <Debts />}
                                {active === 'report' && <Report />}
                                {active === 'archive' && <Archive />}
                                {active === 'settings' && <Settings />}
                            </div>
                        </main>

                        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t md:hidden flex justify-around items-center px-2 py-3 safe-bottom z-[100] shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                            {nav.map(n => (
                                <button key={n.id} onClick={() => setActive(n.id)} className={`flex flex-col items-center gap-1 transition-all ${active === n.id ? 'text-indigo-600 scale-110' : 'text-slate-400'}`}>
                                    <Icon name={n.icon} size={24} />
                                    <span className="text-[8px] font-black">{n.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                    <div className="fixed bottom-24 left-8 z-[999] pointer-events-none">
                        <ToastContainer />
                    </div>
                </AppProvider>
            );
        };
        const ToastContainer = () => {
            const { toasts } = useApp();
            return (
                <div className="space-y-3">
                    {toasts.map(t => <div key={t.id} className={`px-8 py-5 rounded-[1.5rem] shadow-2xl text-white font-black text-xs animate-in pointer-events-auto flex items-center gap-3 ${t.type === 'error' ? 'bg-rose-600' : 'bg-slate-900'}`}><Icon name={t.type === 'error' ? 'alert-circle' : 'check-circle'} size={16} />{t.message}</div>)}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
